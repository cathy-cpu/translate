<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>語意分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0c0c0c;
    --surface:  #161616;
    --border:   #2a2a2a;
    --gold:     #c9a84c;
    --gold-dim: #8a6f2e;
    --text:     #e0e0e0;
    --text-dim: #666666;
    --text-sub: #999999;
    --bubble-ai: #1a1a1a;
    --bubble-user: #1e1a10;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: baseline; gap: 14px; }
  .logo-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px; font-weight: 600;
    color: var(--gold); letter-spacing: 0.05em;
  }
  .logo-en {
    font-size: 11px; letter-spacing: 0.25em;
    color: var(--text-dim); text-transform: uppercase;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .model-badge {
    font-size: 11px; letter-spacing: 0.08em;
    color: var(--text-sub); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 20px; font-family: monospace;
  }
  .header-btn {
    font-size: 12px; color: var(--text-dim);
    background: none; border: 1px solid var(--border);
    padding: 4px 14px; border-radius: 20px;
    cursor: pointer; letter-spacing: 0.05em; transition: all .2s;
  }
  .header-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── API Key Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
  }
  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px; color: var(--gold);
    margin-bottom: 8px; letter-spacing: 0.05em;
  }
  .modal-desc {
    font-size: 12px; color: var(--text-dim);
    line-height: 1.7; margin-bottom: 18px;
  }
  .modal-desc a { color: var(--gold-dim); }
  .modal-input {
    width: 100%; background: #111;
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    color: var(--text); outline: none;
    font-family: monospace; letter-spacing: 0.05em;
    transition: border-color .2s; margin-bottom: 14px;
  }
  .modal-input:focus { border-color: var(--gold-dim); }
  .modal-input::placeholder { color: var(--text-dim); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btn {
    font-size: 12px; padding: 7px 18px;
    border-radius: 20px; cursor: pointer;
    letter-spacing: 0.05em; transition: all .2s;
  }
  .modal-btn-cancel {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
  }
  .modal-btn-cancel:hover { border-color: var(--gold-dim); color: var(--gold); }
  .modal-btn-confirm {
    background: var(--gold); border: none; color: #0c0c0c; font-weight: 600;
  }
  .modal-btn-confirm:hover { opacity: .85; }

  /* ── API Key indicator ── */
  .key-indicator {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
    background: var(--text-dim);
    transition: background .3s;
  }
  .key-indicator.active { background: #4ade80; }

  /* ── Chat area ── */
  #chat {
    flex: 1; overflow-y: auto; padding: 0;
    display: flex; flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Welcome ── */
  .welcome-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; padding: 40px; text-align: center;
  }
  .diamond { width: 52px; height: 52px; position: relative; }
  .diamond svg { width: 100%; height: 100%; opacity: 0.55; }
  .welcome-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 32px; font-weight: 600;
    color: var(--gold); letter-spacing: 0.08em; line-height: 1.3;
  }
  .welcome-sub {
    font-size: 13px; color: var(--text-dim);
    line-height: 2; letter-spacing: 0.05em;
  }
  .welcome-sub span { display: block; }

  /* ── Messages ── */
  .messages { display: flex; flex-direction: column; padding: 24px 0; gap: 0; }
  .msg-row {
    display: flex; flex-direction: column;
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user-row { background: var(--bubble-user); border-left: 2px solid var(--gold-dim); }
  .msg-row.ai-row   { background: var(--bubble-ai);   border-left: 2px solid transparent; }
  .msg-label {
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: 10px; font-family: monospace;
  }
  .user-row .msg-label { color: var(--gold-dim); }
  .ai-row   .msg-label { color: var(--text-dim); }
  .msg-text { font-size: 14px; line-height: 1.8; color: var(--text); }

  .msg-text h2 {
    font-family: 'Noto Serif TC', serif; font-size: 14px; color: var(--gold);
    margin: 18px 0 8px; letter-spacing: 0.05em;
    padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }
  .msg-text h2:first-child { margin-top: 0; }
  .msg-text h3 { font-size: 13px; color: var(--text-sub); margin: 12px 0 6px; }
  .msg-text p  { margin-bottom: 10px; }
  .msg-text p:last-child { margin-bottom: 0; }
  .msg-text ul, .msg-text ol { padding-left: 20px; margin-bottom: 10px; }
  .msg-text li { margin-bottom: 5px; }
  .msg-text strong { color: #e8e8e8; font-weight: 600; }
  .msg-text em { color: var(--text-sub); font-style: italic; }
  .msg-text code {
    background: #222; color: var(--gold);
    padding: 1px 6px; border-radius: 3px;
    font-family: monospace; font-size: 12px;
  }
  .msg-text pre {
    background: #111; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; overflow-x: auto; margin: 10px 0;
  }
  .msg-text pre code { background: none; padding: 0; color: #aaa; }

  .msg-actions { margin-top: 14px; display: flex; gap: 8px; }
  .action-btn {
    font-size: 11px; letter-spacing: 0.08em;
    padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all .2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .action-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── Typing ── */
  .typing-row {
    padding: 20px 28px; background: var(--bubble-ai);
    border-bottom: 1px solid var(--border);
    border-left: 2px solid transparent;
    display: flex; align-items: center; gap: 6px;
  }
  .typing-label {
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--text-dim);
    font-family: monospace; margin-right: 8px;
  }
  .dot {
    width: 5px; height: 5px; background: var(--gold-dim);
    border-radius: 50%; animation: pulse 1.4s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: .3; transform: scale(1); }
    30%            { opacity: 1; transform: scale(1.3); }
  }

  /* ── Input ── */
  .input-area {
    flex-shrink: 0; padding: 20px 28px 14px;
    border-top: 1px solid var(--border); background: var(--bg);
  }
  .input-row {
    display: flex; align-items: flex-end; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; transition: border-color .2s;
  }
  .input-row:focus-within { border-color: var(--gold-dim); }
  #userInput {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300; color: var(--text); resize: none;
    max-height: 120px; line-height: 1.6; letter-spacing: 0.02em;
  }
  #userInput::placeholder { color: var(--text-dim); }
  #sendBtn {
    width: 36px; height: 36px; background: var(--gold);
    border: none; border-radius: 8px; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; transition: opacity .2s, transform .1s;
  }
  #sendBtn:hover:not(:disabled) { opacity: .85; transform: scale(1.05); }
  #sendBtn:disabled { opacity: .3; cursor: not-allowed; }
  #sendBtn svg { width: 16px; height: 16px; fill: #0c0c0c; }
  .input-hint {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.1em; margin-top: 8px; text-align: right;
  }
</style>
</head>
<body>

<!-- API Key Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">設定 Gemini API Key</div>
    <div class="modal-desc">
      請前往 <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a> 取得免費 API Key。<br>
      Key 會儲存在你的瀏覽器（localStorage），下次開啟不需重新輸入，且不會上傳至任何伺服器。
    </div>
    <input class="modal-input" id="apiKeyInput" type="password"
      placeholder="貼上你的 API Key（AIzaSy...）" />
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="saveApiKey()">確認</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">
    <span class="logo-zh">思緒轉驛站</span>
    <span class="logo-en">Semantic Analyzer</span>
  </div>
  <div class="header-right">
    <span class="model-badge">Gemini 3.1 Flash Lite</span>
    <button class="header-btn" onclick="openModal()">
      <span class="key-indicator" id="keyIndicator"></span>API Key
    </button>
    <button class="header-btn" onclick="clearChat()">清除對話</button>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div class="welcome-screen" id="welcomeScreen">
    <div class="diamond">
      <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="30" y="4" width="36" height="36" rx="2" transform="rotate(45 30 4)"
          stroke="#c9a84c" stroke-width="1.5" fill="none"/>
        <rect x="30" y="12" width="24" height="24" rx="1" transform="rotate(45 30 12)"
          stroke="#c9a84c" stroke-width="0.8" fill="none" opacity="0.4"/>
      </svg>
    </div>
    <div class="welcome-title">輸入你的想法</div>
    <div class="welcome-sub">
      <span>模糊的文字、未整理的語意</span>
      <span>AI 將幫你分析、釐清、重新組裝</span>
    </div>
  </div>
  <div class="messages" id="messages" style="display:none;"></div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" rows="1"
      placeholder="輸入任何模糊或需要整理的文字…"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="送出">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter 送出 · Shift+Enter 換行</div>
</div>

<script>
  // ── Config ──
  const GEMINI_MODEL = 'gemini-3.1-flash-lite-preview';
  const SYSTEM_PROMPT = `你是一位專業的「文字語意分析助手」。

使用者會輸入模糊、語意不清或需要重新組裝的文字。你的任務是：

1. **🔍 問題分析**
   - 指出文字中模糊、不清楚或有問題的地方
   - 說明可能造成的語意歧義

2. **💡 修改建議**
   - 具體列出需要修改的部分
   - 說明修改的理由

3. **✅ 正確版本**
   - 提供重新整理後、語意清晰的版本
   - 保留使用者原本想表達的核心意思

輸出格式：使用 Markdown，三個區塊各自清楚標示，語氣專業且友善，回覆使用繁體中文。

對話延續規則：
- 若使用者要求調整，根據上一個「正確版本」繼續修改
- 若輸入全新文字，重新走一遍三步驟流程`;

  // ── State ──
  let apiKey = 'AIzaSyARGV41gENhUPjZKKQQXeoZewl3n08Oa8M';
  let conversationHistory = [];
  let isLoading = false;

  // ── Init ──
  window.onload = () => {
    document.getElementById('keyIndicator').classList.add('active');
  };

  // ── Textarea ──
  const textarea = document.getElementById('userInput');
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  });
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isLoading) sendMessage();
    }
  });

  // ── Send ──
  async function sendMessage() {
    const text = textarea.value.trim();
    if (!text || isLoading) return;
    if (!apiKey) { openModal(); return; }

    showMessages();
    appendUserMsg(text);
    conversationHistory.push({ role: 'user', parts: [{ text }] });
    textarea.value = '';
    textarea.style.height = 'auto';
    setLoading(true);

    const typingEl = showTyping();

    try {
      const reply = await callGemini(conversationHistory);
      removeEl(typingEl);
      appendAiMsg(reply);
      conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    } catch (err) {
      removeEl(typingEl);
      appendAiMsg(`❌ 錯誤：${err.message}`);
    } finally {
      setLoading(false);
    }
  }

  // ── Gemini API (直接 fetch，不需 GAS) ──
  async function callGemini(history) {
    const systemTurn = [
      { role: 'user',  parts: [{ text: SYSTEM_PROMPT }] },
      { role: 'model', parts: [{ text: '了解！我會以「問題分析 → 修改建議 → 正確版本」格式協助你分析文字。' }] }
    ];

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [...systemTurn, ...history],
          generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
        })
      }
    );

    const json = await res.json();
    if (json.error) throw new Error(json.error.message);
    const text = json.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('未收到有效回覆，請重試');
    return text;
  }

  // ── UI helpers ──
  function showMessages() {
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
  }

  function appendUserMsg(text) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row user-row';
    row.innerHTML = `<div class="msg-label">你</div><div class="msg-text">${escapeHtml(text)}</div>`;
    msgs.appendChild(row);
    scrollBottom();
  }

  function appendAiMsg(text) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row ai-row';
    const content = document.createElement('div');
    content.innerHTML = `<div class="msg-label">AI 分析</div><div class="msg-text">${renderMarkdown(text)}</div>`;
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.innerHTML = `<button class="action-btn" onclick="copyText(this, \`${escapeBacktick(text)}\`)">複製結果</button>`;
    row.appendChild(content);
    row.appendChild(actions);
    msgs.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'typing-row';
    el.innerHTML = `<span class="typing-label">分析中</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
    msgs.appendChild(el);
    scrollBottom();
    return el;
  }

  function removeEl(el) { if (el?.parentNode) el.parentNode.removeChild(el); }
  function scrollBottom() { const c = document.getElementById('chat'); c.scrollTop = c.scrollHeight; }
  function setLoading(val) {
    isLoading = val;
    document.getElementById('sendBtn').disabled = val;
    document.getElementById('userInput').disabled = val;
  }

  function clearChat() {
    if (!conversationHistory.length) return;
    if (!confirm('確定清除所有對話？')) return;
    conversationHistory = [];
    document.getElementById('messages').innerHTML = '';
    document.getElementById('messages').style.display = 'none';
    document.getElementById('welcomeScreen').style.display = 'flex';
  }

  function copyText(btn, text) {
    const decoded = text.replace(/\\`/g, '`').replace(/\\n/g, '\n');
    navigator.clipboard.writeText(decoded).then(() => {
      btn.textContent = '已複製';
      setTimeout(() => btn.textContent = '複製結果', 1500);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = decoded; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      btn.textContent = '已複製';
      setTimeout(() => btn.textContent = '複製結果', 1500);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
  function escapeBacktick(str) {
    return str.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\n/g,'\\n');
  }
  function renderMarkdown(text) {
    let html = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>[\n]?)+/g, '<ul>$&</ul>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/\n/g, '<br>');
    return '<p>' + html + '</p>';
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思緒轉驛站</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0c0c0c;
    --surface:   #161616;
    --border:    #2a2a2a;
    --gold:      #c9a84c;
    --gold-dim:  #8a6f2e;
    --text:      #e0e0e0;
    --text-dim:  #666666;
    --text-sub:  #999999;
    --bubble-ai: #1a1a1a;
    --bubble-user: #1e1a10;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: baseline; gap: 14px; }
  .logo-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px; font-weight: 600;
    color: var(--gold); letter-spacing: 0.05em;
  }
  .logo-en {
    font-size: 11px; letter-spacing: 0.25em;
    color: var(--text-dim); text-transform: uppercase;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .model-badge {
    font-size: 11px; letter-spacing: 0.08em;
    color: var(--text-sub); border: 1px solid var(--border);
    padding: 4px 12px; border-radius: 20px; font-family: monospace;
  }
  .header-btn {
    font-size: 12px; color: var(--text-dim);
    background: none; border: 1px solid var(--border);
    padding: 4px 14px; border-radius: 20px;
    cursor: pointer; letter-spacing: 0.05em; transition: all .2s;
  }
  .header-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px; width: 420px; max-width: 90vw;
  }
  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px; color: var(--gold);
    margin-bottom: 8px; letter-spacing: 0.05em;
  }
  .modal-desc { font-size: 12px; color: var(--text-dim); line-height: 1.7; margin-bottom: 18px; }
  .modal-desc a { color: var(--gold-dim); }
  .modal-section-label {
    font-size: 11px; color: var(--text-sub);
    letter-spacing: 0.1em; margin-bottom: 6px; margin-top: 4px;
  }
  .modal-input {
    width: 100%; background: #111; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    color: var(--text); outline: none; font-family: monospace;
    letter-spacing: 0.05em; transition: border-color .2s; margin-bottom: 14px;
  }
  .modal-input:focus { border-color: var(--gold-dim); }
  .modal-input::placeholder { color: var(--text-dim); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  .modal-btn {
    font-size: 12px; padding: 7px 18px; border-radius: 20px;
    cursor: pointer; letter-spacing: 0.05em; transition: all .2s;
  }
  .modal-btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-dim); }
  .modal-btn-cancel:hover { border-color: var(--gold-dim); color: var(--gold); }
  .modal-btn-confirm { background: var(--gold); border: none; color: #0c0c0c; font-weight: 600; }
  .modal-btn-confirm:hover { opacity: .85; }
  .key-indicator {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
    background: var(--text-dim); transition: background .3s;
  }
  .key-indicator.active { background: #4ade80; }
  /* Chat */
  #chat {
    flex: 1; overflow-y: auto; padding: 0;
    display: flex; flex-direction: column;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .welcome-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; padding: 40px; text-align: center;
  }
  .diamond { width: 52px; height: 52px; }
  .diamond svg { width: 100%; height: 100%; opacity: 0.55; }
  .welcome-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 32px; font-weight: 600;
    color: var(--gold); letter-spacing: 0.08em; line-height: 1.3;
  }
  .welcome-sub { font-size: 13px; color: var(--text-dim); line-height: 2; letter-spacing: 0.05em; }
  .welcome-sub span { display: block; }
  .messages { display: flex; flex-direction: column; padding: 24px 0; gap: 0; }
  .msg-row {
    display: flex; flex-direction: column;
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user-row { background: var(--bubble-user); border-left: 2px solid var(--gold-dim); }
  .msg-row.ai-row   { background: var(--bubble-ai);   border-left: 2px solid transparent; }
  .msg-label {
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: 10px; font-family: monospace;
  }
  .user-row .msg-label { color: var(--gold-dim); }
  .ai-row   .msg-label { color: var(--text-dim); }
  .msg-text { font-size: 14px; line-height: 1.8; color: var(--text); }
  .msg-text h2 {
    font-family: 'Noto Serif TC', serif; font-size: 14px; color: var(--gold);
    margin: 18px 0 8px; letter-spacing: 0.05em;
    padding-bottom: 4px; border-bottom: 1px solid var(--border);
  }
  .msg-text h2:first-child { margin-top: 0; }
  .msg-text h3 { font-size: 13px; color: var(--text-sub); margin: 12px 0 6px; }
  .msg-text p  { margin-bottom: 10px; }
  .msg-text p:last-child { margin-bottom: 0; }
  .msg-text ul, .msg-text ol { padding-left: 20px; margin-bottom: 10px; }
  .msg-text li { margin-bottom: 5px; }
  .msg-text strong { color: #e8e8e8; font-weight: 600; }
  .msg-text code {
    background: #222; color: var(--gold);
    padding: 1px 6px; border-radius: 3px;
    font-family: monospace; font-size: 12px;
  }
  .msg-text pre {
    background: #111; border: 1px solid var(--border);
    border-radius: 6px; padding: 12px; overflow-x: auto; margin: 10px 0;
  }
  /* Actions 區塊 */
  .msg-actions {
    margin-top: 14px; display: flex;
    flex-direction: column; gap: 10px;
  }
  .msg-actions-row { display: flex; align-items: center; gap: 8px; }
  .action-btn {
    font-size: 11px; letter-spacing: 0.08em;
    padding: 4px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: all .2s;
    flex-shrink: 0;
  }
  .action-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .action-btn:disabled { opacity: 0.5; cursor: default; }
  .action-btn.save-btn {
    border-color: var(--gold-dim); color: var(--gold);
  }
  .action-btn.save-btn:hover { background: var(--gold-dim); color: #000; }
  .action-btn.save-btn.saved {
    border-color: #4ade80; color: #4ade80; cursor: default;
  }
  .btn-note {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.03em; line-height: 1.5;
  }
  /* Typing */
  .typing-row {
    padding: 20px 28px; background: var(--bubble-ai);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .typing-label {
    font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--text-dim);
    font-family: monospace; margin-right: 8px;
  }
  .dot {
    width: 5px; height: 5px; background: var(--gold-dim);
    border-radius: 50%; animation: pulse 1.4s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: .3; transform: scale(1); }
    30%            { opacity: 1; transform: scale(1.3); }
  }
  /* Input */
  .input-area {
    flex-shrink: 0; padding: 20px 28px 14px;
    border-top: 1px solid var(--border); background: var(--bg);
  }
  .input-row {
    display: flex; align-items: flex-end; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
  }
  #userInput {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    color: var(--text); resize: none; max-height: 120px;
  }
  #finalizeBtn {
    background: none; border: 1px solid var(--gold-dim);
    padding: 6px 15px; color: var(--gold); border-radius: 20px;
    cursor: pointer; font-size: 11px; transition: all .2s;
    flex-shrink: 0; align-self: center;
  }
  #finalizeBtn:hover { background: var(--gold-dim); color: #000; }
  #finalizeBtn:disabled { opacity: 0.5; cursor: default; }
  #sendBtn {
    width: 36px; height: 36px; background: var(--gold);
    border: none; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #sendBtn svg { width: 16px; height: 16px; fill: #0c0c0c; }
  .input-hints { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  .input-hint { font-size: 10px; color: var(--text-dim); text-align: right; }
  .input-hint-ok { font-size: 10px; color: var(--text-dim); text-align: right; letter-spacing: 0.02em; }
</style>
</head>
<body>

<!-- 設定 Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">設定</div>
    <div class="modal-desc">
      Gemini Key 請至 <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a> 取得。<br>
      Sheets Webhook 為選填，填入後可手動儲存結晶結果至試算表。
    </div>
    <div class="modal-section-label">GEMINI API KEY</div>
    <input class="modal-input" id="apiKeyInput" type="password" placeholder="貼上你的 Gemini API Key" />
    <div class="modal-section-label">GOOGLE SHEETS WEBHOOK（選填）</div>
    <input class="modal-input" id="sheetsWebhookInput" type="text" placeholder="貼上 Apps Script Web App 網址" />
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="saveSettings()">確認</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="logo">
    <span class="logo-zh">思緒轉驛站</span>
    <span class="logo-en">Thought Relay Station</span>
  </div>
  <div class="header-right">
   
    <button class="header-btn" onclick="openModal()">
      <span class="key-indicator" id="keyIndicator"></span>設定
    </button>
    <button class="header-btn" onclick="clearChat()">清除對話</button>
  </div>
</div>

<div id="chat">
  <div class="welcome-screen" id="welcomeScreen">
    <div class="diamond">
      <svg viewBox="0 0 60 60"><rect x="30" y="4" width="36" height="36" rx="2" transform="rotate(45 30 4)" stroke="#c9a84c" stroke-width="1.5" fill="none"/></svg>
    </div>
    <div class="welcome-title">輸入你的想法</div>
    <div class="welcome-sub">
      <span>模糊的文字、未整理的語意</span>
      <span>AI 將幫你分析、釐清、重新組裝</span>
    </div>
  </div>
  <div class="messages" id="messages" style="display:none;"></div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="輸入模糊的想法..."></textarea>
    <button id="finalizeBtn" onclick="requestFinalize()">我覺得 OK 了</button>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="input-hints">
    <div class="input-hint">Enter 送出 · Shift+Enter 換行</div>
    <div class="input-hint-ok">「我覺得 OK 了」→ 請 AI 彙整回饋，確認是否還有需要調整的地方</div>
  </div>
</div>

<script>
  // ── 硬寫設定（僅限私人使用，公開 repo 請改用設定介面輸入）──
  let apiKey = 'AIzaSyCON2hmZFq54wRVRSiDnCnKigr6ScA_7zo';
  let sheetsWebhook = 'https://script.google.com/macros/s/AKfycbwCFJVt9o435fkBZNxg6p8N-6uyHNwBBuG23XLtYTpf1K_wKQwBABCmTf-CkmNn3fhJcw/exec';

  const GEMINI_MODEL = 'gemini-3.1-flash-lite-preview';
  const SYSTEM_PROMPT = `你是一位專業的「思緒轉驛站」專家。
任務：將使用者模糊、混亂、帶有情緒或雜訊的思緒，轉譯並結晶成「清晰、精煉、可執行」的版本。
你的運作邏輯：
1. **日常對話**：引導使用者完整表達，若資訊不足（如工作需求缺期限、情緒回報缺訴求）請溫柔追問。
2. **結晶整理 (收到 [結晶化指令] 時)**：
   - 判定資訊是否已完整。
   - 若完整：開頭加上 [FINAL] 標籤。格式包含：
     ## 🔍 現況釐清 (指出混亂點)
     ## 💡 優化重點 (說明整理邏輯)
     ## ✅ 結晶結果 (最終精準文字)
   - 若不完整：不要加標籤，請說明還缺什麼。
回覆使用繁體中文，語氣優雅且專業。`;

  let conversationHistory = [];
  let isLoading = false;

  window.onload = () => {
    // 若有從設定介面覆寫的 Key，優先使用
    const storedKey = localStorage.getItem('gemini_api_key');
    const storedWebhook = localStorage.getItem('sheets_webhook');
    if (storedKey) apiKey = storedKey;
    if (storedWebhook) sheetsWebhook = storedWebhook;
    if (apiKey) document.getElementById('keyIndicator').classList.add('active');
  };

  // ── 「我覺得 OK 了」──
  async function requestFinalize() {
    if (conversationHistory.length === 0 || isLoading) return;
    const finalizePrompt = "【系統指令：請對目前對話進行[結晶化整理]。如果資訊完整請標註 [FINAL]，若不完整請指出缺漏。】";
    showMessages();
    setLoading(true);
    const typingEl = showTyping();
    try {
      const reply = await callGemini([...conversationHistory, { role: 'user', parts: [{ text: finalizePrompt }] }]);
      removeEl(typingEl);
      appendAiMsg(reply);
    } catch (err) {
      removeEl(typingEl);
      appendAiMsg(`❌ 錯誤：${err.message}`);
    } finally {
      setLoading(false);
    }
  }

  // ── 基本對話 ──
  async function sendMessage() {
    const text = document.getElementById('userInput').value.trim();
    if (!text || isLoading) return;
    if (!apiKey) { openModal(); return; }
    showMessages();
    appendUserMsg(text);
    conversationHistory.push({ role: 'user', parts: [{ text }] });
    document.getElementById('userInput').value = '';
    autoResizeTextarea();
    setLoading(true);
    const typingEl = showTyping();
    try {
      const reply = await callGemini(conversationHistory);
      removeEl(typingEl);
      appendAiMsg(reply);
      conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    } catch (err) {
      removeEl(typingEl);
      appendAiMsg(`❌ 錯誤：${err.message}`);
    } finally {
      setLoading(false);
    }
  }

  async function callGemini(history) {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [
          { role: 'user',  parts: [{ text: SYSTEM_PROMPT }] },
          { role: 'model', parts: [{ text: '已進入驛站專家模式。' }] },
          ...history
        ],
        generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
      })
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error.message);
    return json.candidates?.[0]?.content?.parts?.[0]?.text || '未收到回覆';
  }

  // ── 儲存至 Google 試算表 ──
  async function saveToSheets(text, btn) {
    if (!sheetsWebhook) {
      btn.textContent = '未設定 Webhook';
      return;
    }
    btn.textContent = '儲存中…';
    btn.disabled = true;
    try {
      await fetch(sheetsWebhook, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
          content: text
        })
      });
      btn.textContent = '✓ 已儲存';
      btn.classList.add('saved');
    } catch (err) {
      btn.textContent = '✗ 儲存失敗';
      btn.disabled = false;
    }
  }

  // ── UI Helpers ──
  function appendUserMsg(text) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row user-row';
    row.innerHTML = `<div class="msg-label">你</div><div class="msg-text">${text.replace(/\n/g, '<br>')}</div>`;
    msgs.appendChild(row);
    scrollBottom();
  }

  function appendAiMsg(text) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row ai-row';

    const isFinal = text.includes('[FINAL]');
    const cleanText = text.replace('[FINAL]', '').trim();
    const label = isFinal ? "🚉 驛站結晶" : "AI 分析";

    // 基本結構
    row.innerHTML = `
      <div class="msg-label">${label}</div>
      <div class="msg-text">${renderMarkdown(cleanText)}</div>
      <div class="msg-actions">
        <div class="msg-actions-row">
          <button class="action-btn copy-btn">複製結果</button>
          ${isFinal ? '<button class="action-btn save-btn">儲存紀錄</button>' : ''}
        </div>
        <div class="msg-actions-row">
          <span class="btn-note">
            ${isFinal
              ? '「儲存紀錄」→ 確認這是最終版本，按下將儲存至 Google 試算表'
              : ''}
          </span>
        </div>
      </div>`;

    // 複製按鈕：用 dataset 避免特殊字元問題
    const copyBtn = row.querySelector('.copy-btn');
    copyBtn.dataset.copyText = cleanText;
    copyBtn.addEventListener('click', function () {
      copyText(this, this.dataset.copyText);
    });

    // 儲存按鈕：只在 FINAL 時出現
    if (isFinal) {
      const saveBtn = row.querySelector('.save-btn');
      saveBtn.dataset.saveText = cleanText;
      saveBtn.addEventListener('click', function () {
        saveToSheets(this.dataset.saveText, this);
      });
    }

    msgs.appendChild(row);
    scrollBottom();
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '已複製 ✓';
      setTimeout(() => btn.textContent = '複製結果', 1500);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '已複製 ✓';
      setTimeout(() => btn.textContent = '複製結果', 1500);
    });
  }

  function showMessages() {
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing-row';
    el.innerHTML = `<span class="typing-label">分析中</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
    document.getElementById('messages').appendChild(el);
    scrollBottom();
    return el;
  }

  function removeEl(el) { if (el?.parentNode) el.parentNode.removeChild(el); }
  function scrollBottom() { const c = document.getElementById('chat'); c.scrollTop = c.scrollHeight; }

  function setLoading(val) {
    isLoading = val;
    document.getElementById('sendBtn').disabled = val;
    document.getElementById('finalizeBtn').disabled = val;
  }

  // ── 設定 Modal ──
  function openModal() {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('sheetsWebhookInput').value = sheetsWebhook;
    document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
  function saveSettings() {
    const key = document.getElementById('apiKeyInput').value.trim();
    const webhook = document.getElementById('sheetsWebhookInput').value.trim();
    if (key) {
      apiKey = key;
      localStorage.setItem('gemini_api_key', key);
      document.getElementById('keyIndicator').classList.add('active');
    }
    if (webhook) {
      sheetsWebhook = webhook;
      localStorage.setItem('sheets_webhook', webhook);
    }
    closeModal();
  }

  function clearChat() {
    if (confirm('清除對話？')) {
      conversationHistory = [];
      document.getElementById('messages').innerHTML = '';
      document.getElementById('welcomeScreen').style.display = '';
      document.getElementById('messages').style.display = 'none';
    }
  }

  function renderMarkdown(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/<\/ul><ul>/g, '');
  }

  // Textarea 自動高度
  const ta = document.getElementById('userInput');
  function autoResizeTextarea() {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  }
  ta.addEventListener('input', autoResizeTextarea);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
